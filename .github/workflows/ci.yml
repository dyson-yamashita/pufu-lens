name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo/cache
            apps/web/.next/cache
          key: ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-build-cache-

      - name: Typecheck
        run: pnpm typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo/cache
            apps/web/.next/cache
          key: ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-build-cache-

      - name: Test
        run: pnpm test

  db-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore PostgreSQL image build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache/postgres-ci
          key: ${{ runner.os }}-postgres-ci-${{ hashFiles('infra/docker/postgres/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-postgres-ci-

      - name: Build PostgreSQL test image
        run: |
          set -euo pipefail

          mkdir -p /tmp/.buildx-cache/postgres-ci
          docker buildx create --use --name pufu-lens-ci-builder
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache/postgres-ci \
            --cache-to type=local,dest=/tmp/.buildx-cache/postgres-ci-new,mode=min \
            --load \
            --tag pufu-lens-postgres-ci:latest \
            infra/docker/postgres
          rm -rf /tmp/.buildx-cache/postgres-ci
          mv /tmp/.buildx-cache/postgres-ci-new /tmp/.buildx-cache/postgres-ci

      - name: Start PostgreSQL
        run: |
          docker run \
            --detach \
            --name pufu-lens-postgres-ci \
            --publish 5432:5432 \
            --env POSTGRES_DB=pufu_lens \
            --env POSTGRES_USER=pufu_lens \
            --env POSTGRES_PASSWORD=pufu_lens \
            pufu-lens-postgres-ci:latest
          for attempt in {1..30}; do
            if docker exec pufu-lens-postgres-ci pg_isready -U pufu_lens -d pufu_lens; then
              exit 0
            fi
            echo "Waiting for PostgreSQL (${attempt}/30)"
            sleep 2
          done
          docker logs pufu-lens-postgres-ci
          exit 1

      - name: Initialize PostgreSQL schema
        run: |
          docker cp infra/docker/postgres/init.sql pufu-lens-postgres-ci:/tmp/init.sql
          docker exec \
            --env PGPASSWORD=pufu_lens \
            pufu-lens-postgres-ci \
            psql -v ON_ERROR_STOP=1 -U pufu_lens -d pufu_lens -f /tmp/init.sql

      - name: DB migration check
        run: pnpm db:migrate --check
        env:
          DATABASE_URL: postgres://pufu_lens:pufu_lens@localhost:5432/pufu_lens

      - name: DB schema drift check
        run: pnpm db:schema-drift
        env:
          DATABASE_URL: postgres://pufu_lens:pufu_lens@localhost:5432/pufu_lens

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .turbo/cache
            apps/web/.next/cache
          key: ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-build-cache-

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/ci-ref"
          git checkout --detach refs/remotes/origin/ci-ref
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node.js
        run: |
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64' -type d | sort -V | tail -n 1)"
          if [ -n "${node_dir}" ]; then
            echo "${node_dir}/bin" >> "${GITHUB_PATH}"
            export PATH="${node_dir}/bin:${PATH}"
          fi
          node --version

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build E2E workspace dependencies
        run: pnpm --filter '@pufu-lens/web^...' build

      - name: Detect E2E changes
        id: e2e-changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD)"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$changed_files"

          if echo "$changed_files" | grep -E '^(apps/web/|packages/|infra/volumes/pufu-lens-data/|package.json|pnpm-lock.yaml|turbo.json|\.github/workflows/ci\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Playwright cache
        if: steps.e2e-changes.outputs.run == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser dependencies
        if: steps.e2e-changes.outputs.run == 'true'
        run: pnpm --filter @pufu-lens/web exec playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.e2e-changes.outputs.run == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @pufu-lens/web exec playwright install chromium

      - name: E2E test
        if: steps.e2e-changes.outputs.run == 'true'
        run: pnpm test:e2e
        env:
          PUFU_LENS_ALLOW_FIXED_USER_FALLBACK: 'true'
          PUFU_LENS_ENABLE_FIXTURE_FALLBACK: 'true'
          PUFU_LENS_REPORT_USER_ID: user-a
          STORAGE_DRIVER: local
          STORAGE_ROOT: ../../infra/volumes/pufu-lens-data

      - name: Restore PostgreSQL image build cache for E2E
        if: steps.e2e-changes.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache/postgres-ci
          key: ${{ runner.os }}-postgres-ci-${{ hashFiles('infra/docker/postgres/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-postgres-ci-

      - name: Build PostgreSQL test image for E2E
        if: steps.e2e-changes.outputs.run == 'true'
        run: |
          set -euo pipefail

          mkdir -p /tmp/.buildx-cache/postgres-ci
          docker buildx create --use --name pufu-lens-e2e-builder
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache/postgres-ci \
            --cache-to type=local,dest=/tmp/.buildx-cache/postgres-ci-new,mode=min \
            --load \
            --tag pufu-lens-postgres-ci:latest \
            infra/docker/postgres
          rm -rf /tmp/.buildx-cache/postgres-ci
          mv /tmp/.buildx-cache/postgres-ci-new /tmp/.buildx-cache/postgres-ci

      - name: Start PostgreSQL for private chat E2E
        if: steps.e2e-changes.outputs.run == 'true'
        run: |
          docker run \
            --detach \
            --name pufu-lens-postgres-e2e \
            --publish 5432:5432 \
            --env POSTGRES_DB=pufu_lens \
            --env POSTGRES_USER=pufu_lens \
            --env POSTGRES_PASSWORD=pufu_lens \
            pufu-lens-postgres-ci:latest
          for attempt in {1..30}; do
            if docker exec pufu-lens-postgres-e2e pg_isready -U pufu_lens -d pufu_lens; then
              exit 0
            fi
            echo "Waiting for PostgreSQL (${attempt}/30)"
            sleep 2
          done
          docker logs pufu-lens-postgres-e2e
          exit 1

      - name: Initialize PostgreSQL for private chat E2E
        if: steps.e2e-changes.outputs.run == 'true'
        run: |
          docker cp infra/docker/postgres/init.sql pufu-lens-postgres-e2e:/tmp/init.sql
          docker exec \
            --env PGPASSWORD=pufu_lens \
            pufu-lens-postgres-e2e \
            psql -v ON_ERROR_STOP=1 -U pufu_lens -d pufu_lens -f /tmp/init.sql

      - name: Seed private chat E2E user
        if: steps.e2e-changes.outputs.run == 'true'
        run: pnpm test:e2e:seed-chat
        env:
          DATABASE_URL: postgres://pufu_lens:pufu_lens@localhost:5432/pufu_lens
          PUFU_LENS_E2E_CHAT_EMAIL: e2e-chat-member@example.test
          PUFU_LENS_E2E_CHAT_PASSWORD: pufu-lens-e2e-chat-password

      - name: Private chat write-to-read E2E test
        if: steps.e2e-changes.outputs.run == 'true'
        run: pnpm --filter @pufu-lens/web test:e2e --project desktop --grep "member sends private chat"
        env:
          DATABASE_URL: postgres://pufu_lens:pufu_lens@localhost:5432/pufu_lens
          MASTRA_SERVER_URL: http://127.0.0.1:4111
          PUFU_LENS_E2E_CHAT_EMAIL: e2e-chat-member@example.test
          PUFU_LENS_E2E_CHAT_PASSWORD: pufu-lens-e2e-chat-password
          STORAGE_DRIVER: local
          STORAGE_ROOT: ../../infra/volumes/pufu-lens-data

# Cloud Build deploy example for OSS users.
#
# Trigger deploys from a protected branch or release tag only. Do not reuse this
# config for pull request CI.
timeout: 3600s

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ENV: staging
  _REGION: asia-east1
  _ARTIFACT_REPO: pufu-lens
  _RUNTIME_SERVICE_ACCOUNT: ''
  _SCHEDULER_SERVICE_ACCOUNT: ''
  _STORAGE_BUCKET: ''
  _VPC_CONNECTOR: mastra-connector
  _MASTRA_SERVICE: mastra-server
  _MASTRA_IMAGE: mastra-server
  _JOBS_IMAGE: workflow-job
  _FIREBASE_DEPLOY: 'true'
  _FIREBASE_TOOLS_VERSION: 14.4.0
  _RUN_DB_MIGRATIONS: 'true'
  _DB_MIGRATION_JOB: db-migrate

steps:
  - id: validate-deploy-substitutions
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        case "${_ENV}" in
          staging|production) ;;
          *)
            echo "_ENV must be staging or production." >&2
            exit 1
            ;;
        esac

        for pair in \
          "_REGION=${_REGION}" \
          "_ARTIFACT_REPO=${_ARTIFACT_REPO}" \
          "_RUNTIME_SERVICE_ACCOUNT=${_RUNTIME_SERVICE_ACCOUNT}" \
          "_SCHEDULER_SERVICE_ACCOUNT=${_SCHEDULER_SERVICE_ACCOUNT}" \
          "_STORAGE_BUCKET=${_STORAGE_BUCKET}" \
          "_VPC_CONNECTOR=${_VPC_CONNECTOR}" \
          "_MASTRA_SERVICE=${_MASTRA_SERVICE}" \
          "_MASTRA_IMAGE=${_MASTRA_IMAGE}" \
          "_JOBS_IMAGE=${_JOBS_IMAGE}"; do
          name="$${pair%%=*}"
          value="$${pair#*=}"
          if [[ -z "$${value}" ]]; then
            echo "$${name} is required." >&2
            exit 1
          fi
        done

        case "${_RUN_DB_MIGRATIONS}" in
          true|false) ;;
          *)
            echo "_RUN_DB_MIGRATIONS must be true or false." >&2
            exit 1
            ;;
        esac

        if [[ "${_RUN_DB_MIGRATIONS}" == "true" && -z "${_DB_MIGRATION_JOB}" ]]; then
          echo "_DB_MIGRATION_JOB is required when _RUN_DB_MIGRATIONS is true." >&2
          exit 1
        fi

  - id: build-mastra-server
    name: gcr.io/cloud-builders/docker
    waitFor:
      - validate-deploy-substitutions
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}"
        docker buildx create --name mastra-cache-builder --driver docker-container --use || docker buildx use mastra-cache-builder
        docker buildx inspect --bootstrap
        docker buildx build \
          --cache-from "type=registry,ref=$${image}:buildcache" \
          --cache-to "type=registry,ref=$${image}:buildcache,mode=max" \
          --file infra/docker/mastra/Dockerfile \
          --tag "$${image}:${SHORT_SHA}" \
          --tag "$${image}:latest" \
          --load \
          .

  - id: push-mastra-server
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-mastra-server
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}

  - id: build-workflow-job
    name: gcr.io/cloud-builders/docker
    waitFor:
      - validate-deploy-substitutions
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}"
        docker buildx create --name jobs-cache-builder --driver docker-container --use || docker buildx use jobs-cache-builder
        docker buildx inspect --bootstrap
        docker buildx build \
          --cache-from "type=registry,ref=$${image}:buildcache" \
          --cache-to "type=registry,ref=$${image}:buildcache,mode=max" \
          --file infra/docker/jobs/Dockerfile \
          --tag "$${image}:${SHORT_SHA}" \
          --tag "$${image}:latest" \
          --load \
          .

  - id: push-workflow-job
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-workflow-job
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}

  - id: run-db-migration
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-workflow-job
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        if [[ "${_RUN_DB_MIGRATIONS}" != "true" ]]; then
          echo "Skipping DB migration because _RUN_DB_MIGRATIONS is not true."
          exit 0
        fi

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}:${SHORT_SHA}"
        job_args=(
          "${_DB_MIGRATION_JOB}"
          --image "${image}"
          --region "${_REGION}"
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}"
          --vpc-connector "${_VPC_CONNECTOR}"
          --command pnpm
          --args db:migrate
          --tasks 1
          --max-retries 0
          --set-secrets "DATABASE_URL=DATABASE_URL:latest"
        )

        describe_error="$$(mktemp)"
        if gcloud run jobs describe "${_DB_MIGRATION_JOB}" --region "${_REGION}" >/dev/null 2>"$${describe_error}"; then
          gcloud run jobs update "${job_args[@]}"
        else
          describe_status="$${?}"
          if grep -Eiq 'NOT_FOUND|not found|Cannot find job|could not be found|does not exist' "$${describe_error}"; then
            echo "Creating DB migration job ${_DB_MIGRATION_JOB} because it does not exist."
            rm -f "$${describe_error}"
            gcloud run jobs create "${job_args[@]}"
          else
            cat "$${describe_error}" >&2
            rm -f "$${describe_error}"
            exit "$${describe_status}"
          fi
        fi
        rm -f "$${describe_error}"

        gcloud run jobs execute "${_DB_MIGRATION_JOB}" --region "${_REGION}" --wait

  - id: deploy-mastra-server
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-mastra-server
      - run-db-migration
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        gcloud run deploy "${_MASTRA_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}:${SHORT_SHA}" \
          --region "${_REGION}" \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --vpc-connector "${_VPC_CONNECTOR}" \
          --no-allow-unauthenticated \
          --port 8080 \
          --set-env-vars "STORAGE_DRIVER=gcs,STORAGE_BUCKET=${_STORAGE_BUCKET},GEMINI_CHAT_MODEL=gemini-2.5-flash,GEMINI_EMBEDDING_MODEL=gemini-embedding-2,GOOGLE_GENAI_USE_VERTEXAI=false" \
          --set-secrets "DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GOOGLE_GENERATIVE_AI_API_KEY=GEMINI_API_KEY:latest"

        mkdir -p /workspace/.cloudbuild
        gcloud run services describe "${_MASTRA_SERVICE}" \
          --region "${_REGION}" \
          --format "value(status.url)" > /workspace/.cloudbuild/mastra-server-url

  - id: deploy-workflow-jobs
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-workflow-job
      - run-db-migration
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        for workflow_id in curate-workflow ingest-workflow generate-report; do
          job_name="${_ENV}-$${workflow_id}"
          job_args=(
            "$${job_name}"
            --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}:${SHORT_SHA}"
            --region "${_REGION}"
            --service-account "${_RUNTIME_SERVICE_ACCOUNT}"
            --vpc-connector "${_VPC_CONNECTOR}"
            --set-env-vars "STORAGE_DRIVER=gcs,STORAGE_BUCKET=${_STORAGE_BUCKET},WORKFLOW_ID=$${workflow_id},GEMINI_CHAT_MODEL=gemini-2.5-flash,GEMINI_EMBEDDING_MODEL=gemini-embedding-2,GEMINI_EMBEDDING_DIMENSIONS=1536,GOOGLE_GENAI_USE_VERTEXAI=false"
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,AUTH_SECRET=AUTH_SECRET:latest"
          )
          if gcloud run jobs describe "$${job_name}" --region "${_REGION}" >/dev/null 2>&1; then
            gcloud run jobs update "$${job_args[@]}"
          else
            gcloud run jobs create "$${job_args[@]}"
          fi
        done

  - id: deploy-web-app-hosting
    name: node:22-bookworm
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        if [[ "${_FIREBASE_DEPLOY}" != "true" ]]; then
          echo "Skipping Firebase App Hosting deploy because _FIREBASE_DEPLOY is not true."
          exit 0
        fi

        npm install --global "firebase-tools@${_FIREBASE_TOOLS_VERSION}"
        firebase deploy --only apphosting --project "${PROJECT_ID}" --non-interactive

  - id: smoke
    name: node:22-bookworm
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
      - deploy-web-app-hosting
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        MASTRA_SERVER_URL="$$(cat /workspace/.cloudbuild/mastra-server-url)" \
          SCHEDULER_SERVICE_ACCOUNT="${_SCHEDULER_SERVICE_ACCOUNT}" \
          node --experimental-strip-types scripts/deploy-smoke.ts --env "${_ENV}"

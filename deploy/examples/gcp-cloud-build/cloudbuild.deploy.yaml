# Cloud Build deploy example for OSS users.
#
# Trigger deploys from a protected branch or release tag only. Do not reuse this
# config for pull request CI.
timeout: 3600s

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _ENV: staging
  _REGION: asia-east1
  _ARTIFACT_REPO: pufu-lens
  _RUNTIME_SERVICE_ACCOUNT: ''
  _SCHEDULER_SERVICE_ACCOUNT: ''
  _STORAGE_BUCKET: ''
  _VPC_CONNECTOR: mastra-connector
  _MASTRA_SERVICE: mastra-server
  _MASTRA_IMAGE: mastra-server
  _JOBS_IMAGE: workflow-job
  _FIREBASE_DEPLOY: 'true'
  _FIREBASE_TOOLS_VERSION: 14.4.0
  _RUN_DB_MIGRATIONS: 'true'
  _DB_MIGRATION_JOB: db-migrate
  _SOURCE_SYNC_DISPATCHER_JOB: source-sync-dispatcher
  _SOURCE_SYNC_SCHEDULER: source-sync-dispatcher
  _REPORT_SCHEDULE_DISPATCHER_JOB: report-schedule-dispatcher
  _REPORT_SCHEDULE_SCHEDULER: report-schedule-dispatcher

steps:
  - id: validate-deploy-substitutions
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        case "${_ENV}" in
          staging|production) ;;
          *)
            echo "_ENV must be staging or production." >&2
            exit 1
            ;;
        esac

        for pair in \
          "_REGION=${_REGION}" \
          "_ARTIFACT_REPO=${_ARTIFACT_REPO}" \
          "_RUNTIME_SERVICE_ACCOUNT=${_RUNTIME_SERVICE_ACCOUNT}" \
          "_SCHEDULER_SERVICE_ACCOUNT=${_SCHEDULER_SERVICE_ACCOUNT}" \
          "_STORAGE_BUCKET=${_STORAGE_BUCKET}" \
          "_VPC_CONNECTOR=${_VPC_CONNECTOR}" \
          "_MASTRA_SERVICE=${_MASTRA_SERVICE}" \
          "_MASTRA_IMAGE=${_MASTRA_IMAGE}" \
          "_JOBS_IMAGE=${_JOBS_IMAGE}"; do
          name="$${pair%%=*}"
          value="$${pair#*=}"
          if [[ -z "$${value}" ]]; then
            echo "$${name} is required." >&2
            exit 1
          fi
        done

        if [[ -z "${_SOURCE_SYNC_DISPATCHER_JOB}" || -z "${_SOURCE_SYNC_SCHEDULER}" ]]; then
          echo "_SOURCE_SYNC_DISPATCHER_JOB and _SOURCE_SYNC_SCHEDULER are required." >&2
          exit 1
        fi

        if [[ -z "${_REPORT_SCHEDULE_DISPATCHER_JOB}" || -z "${_REPORT_SCHEDULE_SCHEDULER}" ]]; then
          echo "_REPORT_SCHEDULE_DISPATCHER_JOB and _REPORT_SCHEDULE_SCHEDULER are required." >&2
          exit 1
        fi

        case "${_RUN_DB_MIGRATIONS}" in
          true|false) ;;
          *)
            echo "_RUN_DB_MIGRATIONS must be true or false." >&2
            exit 1
            ;;
        esac

        if [[ "${_RUN_DB_MIGRATIONS}" == "true" && -z "${_DB_MIGRATION_JOB}" ]]; then
          echo "_DB_MIGRATION_JOB is required when _RUN_DB_MIGRATIONS is true." >&2
          exit 1
        fi

  - id: build-mastra-server
    name: gcr.io/cloud-builders/docker
    waitFor:
      - validate-deploy-substitutions
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}"
        docker buildx create --name mastra-cache-builder --driver docker-container --use || docker buildx use mastra-cache-builder
        docker buildx inspect --bootstrap
        docker buildx build \
          --cache-from "type=registry,ref=$${image}:buildcache" \
          --cache-to "type=registry,ref=$${image}:buildcache,mode=max" \
          --file infra/docker/mastra/Dockerfile \
          --tag "$${image}:${SHORT_SHA}" \
          --tag "$${image}:latest" \
          --load \
          .

  - id: push-mastra-server
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-mastra-server
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}

  - id: build-workflow-job
    name: gcr.io/cloud-builders/docker
    waitFor:
      - validate-deploy-substitutions
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}"
        docker buildx create --name jobs-cache-builder --driver docker-container --use || docker buildx use jobs-cache-builder
        docker buildx inspect --bootstrap
        docker buildx build \
          --cache-from "type=registry,ref=$${image}:buildcache" \
          --cache-to "type=registry,ref=$${image}:buildcache,mode=max" \
          --file infra/docker/jobs/Dockerfile \
          --tag "$${image}:${SHORT_SHA}" \
          --tag "$${image}:latest" \
          --load \
          .

  - id: push-workflow-job
    name: gcr.io/cloud-builders/docker
    waitFor:
      - build-workflow-job
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}

  - id: run-db-migration
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-workflow-job
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        if [[ "${_RUN_DB_MIGRATIONS}" != "true" ]]; then
          echo "Skipping DB migration because _RUN_DB_MIGRATIONS is not true."
          exit 0
        fi

        image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}:${SHORT_SHA}"
        job_args=(
          "${_DB_MIGRATION_JOB}"
          --image "${image}"
          --region "${_REGION}"
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}"
          --vpc-connector "${_VPC_CONNECTOR}"
          --command pnpm
          --args db:migrate
          --tasks 1
          --max-retries 0
          --set-secrets "DATABASE_URL=DATABASE_URL:latest"
        )

        not_found_pattern='NOT_FOUND|not found|cannot find job|could not be found|does not exist'
        describe_error="$$(mktemp)"
        if gcloud run jobs describe "${_DB_MIGRATION_JOB}" --region "${_REGION}" >/dev/null 2>"$${describe_error}"; then
          gcloud run jobs update "${job_args[@]}"
        else
          describe_status="$${?}"
          if grep -Eiq "$${not_found_pattern}" "$${describe_error}"; then
            echo "Creating DB migration job ${_DB_MIGRATION_JOB} because it does not exist."
            rm -f "$${describe_error}"
            gcloud run jobs create "${job_args[@]}"
          else
            cat "$${describe_error}" >&2
            rm -f "$${describe_error}"
            exit "$${describe_status}"
          fi
        fi
        rm -f "$${describe_error}"

        gcloud run jobs execute "${_DB_MIGRATION_JOB}" --region "${_REGION}" --wait

  - id: deploy-mastra-server
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-mastra-server
      - run-db-migration
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        gcloud run deploy "${_MASTRA_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_MASTRA_IMAGE}:${SHORT_SHA}" \
          --region "${_REGION}" \
          --service-account "${_RUNTIME_SERVICE_ACCOUNT}" \
          --vpc-connector "${_VPC_CONNECTOR}" \
          --no-allow-unauthenticated \
          --port 8080 \
          --set-env-vars "STORAGE_DRIVER=gcs,STORAGE_BUCKET=${_STORAGE_BUCKET},GEMINI_CHAT_MODEL=gemini-2.5-flash,GEMINI_EMBEDDING_MODEL=gemini-embedding-2,GEMINI_EMBEDDING_DIMENSIONS=1536,GOOGLE_GENAI_USE_VERTEXAI=false,GOOGLE_CLOUD_PROJECT=${PROJECT_ID},CLOUD_RUN_JOBS_REGION=${_REGION},SOURCE_SYNC_DISPATCHER_JOB_NAME=${_ENV}-${_SOURCE_SYNC_DISPATCHER_JOB},REPORT_SCHEDULE_DISPATCHER_JOB_NAME=${_ENV}-${_REPORT_SCHEDULE_DISPATCHER_JOB}" \
          --set-secrets "DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,GOOGLE_GENERATIVE_AI_API_KEY=GEMINI_API_KEY:latest"

        mkdir -p /workspace/.cloudbuild
        gcloud run services describe "${_MASTRA_SERVICE}" \
          --region "${_REGION}" \
          --format "value(status.url)" > /workspace/.cloudbuild/mastra-server-url

  - id: deploy-workflow-jobs
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - push-workflow-job
      - run-db-migration
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        for workflow_id in curate-workflow ingest-workflow generate-report source-sync-dispatcher report-schedule-dispatcher; do
          job_name="${_ENV}-$${workflow_id}"
          job_args=(
            "$${job_name}"
            --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_JOBS_IMAGE}:${SHORT_SHA}"
            --region "${_REGION}"
            --service-account "${_RUNTIME_SERVICE_ACCOUNT}"
            --vpc-connector "${_VPC_CONNECTOR}"
            --set-env-vars "STORAGE_DRIVER=gcs,STORAGE_BUCKET=${_STORAGE_BUCKET},WORKFLOW_ID=$${workflow_id},GEMINI_CHAT_MODEL=gemini-2.5-flash,GEMINI_EMBEDDING_MODEL=gemini-embedding-2,GEMINI_EMBEDDING_DIMENSIONS=1536,GOOGLE_GENAI_USE_VERTEXAI=false"
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,AUTH_SECRET=AUTH_SECRET:latest"
          )
          if [[ "$${workflow_id}" == "source-sync-dispatcher" || "$${workflow_id}" == "report-schedule-dispatcher" ]]; then
            job_args+=(--tasks 1 --max-retries 0 --task-timeout 3300s)
          fi
          if gcloud run jobs describe "$${job_name}" --region "${_REGION}" >/dev/null 2>&1; then
            gcloud run jobs update "$${job_args[@]}"
          else
            gcloud run jobs create "$${job_args[@]}"
          fi
        done

  - id: deploy-source-sync-scheduler
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        service_url="$$(cat /workspace/.cloudbuild/mastra-server-url)"
        scheduler_name="${_ENV}-${_SOURCE_SYNC_SCHEDULER}"
        scheduler_args=(
          --location "${_REGION}"
          --schedule "*/5 * * * *"
          --time-zone "Etc/UTC"
          --uri "$${service_url}/internal/schedules/source-sync-dispatcher:run"
          --http-method POST
          --message-body '{}'
          --oidc-service-account-email "${_SCHEDULER_SERVICE_ACCOUNT}"
          --oidc-token-audience "$${service_url}"
        )
        if gcloud scheduler jobs describe "$${scheduler_name}" --location "${_REGION}" >/dev/null 2>&1; then
          gcloud scheduler jobs update http "$${scheduler_name}" "$${scheduler_args[@]}" --update-headers "Content-Type=application/json"
        else
          gcloud scheduler jobs create http "$${scheduler_name}" "$${scheduler_args[@]}" --headers "Content-Type=application/json"
        fi

  - id: deploy-report-schedule-scheduler
    name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        service_url="$$(cat /workspace/.cloudbuild/mastra-server-url)"
        scheduler_name="${_ENV}-${_REPORT_SCHEDULE_SCHEDULER}"
        scheduler_args=(
          --location "${_REGION}"
          --schedule "*/5 * * * *"
          --time-zone "Etc/UTC"
          --uri "$${service_url}/internal/schedules/report-schedule-dispatcher:run"
          --http-method POST
          --message-body '{}'
          --oidc-service-account-email "${_SCHEDULER_SERVICE_ACCOUNT}"
          --oidc-token-audience "$${service_url}"
        )
        if gcloud scheduler jobs describe "$${scheduler_name}" --location "${_REGION}" >/dev/null 2>&1; then
          gcloud scheduler jobs update http "$${scheduler_name}" "$${scheduler_args[@]}" --update-headers "Content-Type=application/json"
        else
          gcloud scheduler jobs create http "$${scheduler_name}" "$${scheduler_args[@]}" --headers "Content-Type=application/json"
        fi

  - id: deploy-web-app-hosting
    name: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/firebase-tools:${_FIREBASE_TOOLS_VERSION}
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
      - deploy-source-sync-scheduler
      - deploy-report-schedule-scheduler
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        if [[ "${_FIREBASE_DEPLOY}" != "true" ]]; then
          echo "Skipping Firebase App Hosting deploy because _FIREBASE_DEPLOY is not true."
          exit 0
        fi

        # apps/web に影響しない変更ならスキップ。
        # 最終成功 SHA が無い / 履歴に無い場合はデプロイ側に倒す。
        web_paths='^(apps/web/|firebase\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|package\.json|packages/|infra/docker/firebase-tools/|deploy/examples/gcp-cloud-build/cloudbuild\.deploy\.yaml)'
        state_bucket="$$(node --experimental-strip-types scripts/apphosting-deploy-state.ts bucket --project "${PROJECT_ID}")"
        state_object="$$(node --experimental-strip-types scripts/apphosting-deploy-state.ts object-path --env "${_ENV}")"
        commit_sha="${COMMIT_SHA}"

        if git rev-parse --git-dir >/dev/null 2>&1; then
          last_success="$$(node --experimental-strip-types scripts/apphosting-deploy-state.ts read --bucket "$${state_bucket}" --object "$${state_object}" || true)"
          if [[ -n "$${last_success}" ]]; then
            if ! git cat-file -e "$${last_success}^{commit}" 2>/dev/null; then
              git fetch --deepen=200 >/dev/null 2>&1 || git fetch --unshallow >/dev/null 2>&1 || true
            fi
            if git cat-file -e "$${last_success}^{commit}" 2>/dev/null; then
              if [[ "$${last_success}" == "$${commit_sha}" ]]; then
                echo "App Hosting already deployed for $${commit_sha}. Skipping."
                exit 0
              fi
              if ! git diff --name-only "$${last_success}" HEAD | grep -qE "$${web_paths}"; then
                echo "No web-related changes since last successful deploy ($${last_success}). Skipping App Hosting deploy."
                exit 0
              fi
            else
              echo "Last success SHA $${last_success} is not in git history. Deploying App Hosting."
            fi
          else
            echo "No App Hosting last-success marker found. Deploying."
          fi
        else
          echo "Git metadata unavailable. Deploying App Hosting."
        fi

        firebase deploy --only apphosting --project "${PROJECT_ID}" --non-interactive

        node --experimental-strip-types scripts/apphosting-deploy-state.ts write \
          --bucket "$${state_bucket}" \
          --object "$${state_object}" \
          --sha "$${commit_sha}"
        echo "Recorded App Hosting last-success SHA $${commit_sha} at gs://$${state_bucket}/$${state_object}"

  - id: smoke
    name: node:22-bookworm
    waitFor:
      - deploy-mastra-server
      - deploy-workflow-jobs
      - deploy-source-sync-scheduler
      - deploy-report-schedule-scheduler
      - deploy-web-app-hosting
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        MASTRA_SERVER_URL="$$(cat /workspace/.cloudbuild/mastra-server-url)" \
          SCHEDULER_SERVICE_ACCOUNT="${_SCHEDULER_SERVICE_ACCOUNT}" \
          node --experimental-strip-types scripts/deploy-smoke.ts --env "${_ENV}"
